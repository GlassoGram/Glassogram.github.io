<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GLASSOGRAM | Переход и Android App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #19233c 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* эффект свечения сзади */
        body::before {
            content: "";
            position: absolute;
            width: 180%;
            height: 180%;
            top: -40%;
            left: -40%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 80, 120, 0.15), rgba(0, 30, 60, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* главный контейнер карточки */
        .glass-panel {
            background: rgba(20, 28, 40, 0.65);
            backdrop-filter: blur(18px);
            border-radius: 3.5rem;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .glass-panel:hover {
            transform: scale(1.01);
            box-shadow: 0 30px 55px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #c0ccf0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #a9b7e8;
            font-weight: 500;
            font-size: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            display: inline-block;
            padding-bottom: 6px;
        }

        /* кнопка — главный акцент */
        .glasso-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(105deg, #ff4d6d, #ff1e4d);
            border: none;
            padding: 1rem 2.2rem;
            font-size: 1.4rem;
            font-weight: 700;
            font-family: inherit;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 15px 25px -8px rgba(255, 30, 77, 0.4);
            margin: 1rem 0 1rem;
            letter-spacing: 0.5px;
            width: auto;
            min-width: 260px;
        }

        .glasso-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(105deg, #ff607d, #ff1f50);
            box-shadow: 0 22px 30px -12px rgba(255, 30, 77, 0.6);
        }

        .glasso-btn:active {
            transform: translateY(2px);
            transition: 0.05s;
        }

        /* кнопка для андроид (второстепенная) */
        .android-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(30, 40, 60, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 0.85rem 1.8rem;
            font-size: 1.2rem;
            font-weight: 600;
            font-family: inherit;
            color: #e0ecff;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 0.8rem 0 0.5rem;
            width: auto;
            min-width: 240px;
            backdrop-filter: blur(4px);
        }

        .android-btn:hover {
            background: rgba(50, 65, 95, 0.95);
            border-color: rgba(255, 255, 255, 0.5);
            color: white;
            transform: translateY(-2px);
        }

        .android-btn:active {
            transform: translateY(1px);
        }

        /* разделитель */
        .divider {
            margin: 1.2rem 0 0.8rem;
            width: 80px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            display: inline-block;
        }

        /* таймер-блок */
        .timer-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 100px;
            padding: 0.75rem 1.2rem;
            margin: 1.2rem 0 0.5rem;
            display: inline-flex;
            align-items: baseline;
            gap: 10px;
            backdrop-filter: blur(4px);
            font-weight: 500;
        }

        .timer-label {
            font-size: 1rem;
            color: #b9c8ff;
        }

        .timer-number {
            font-size: 2rem;
            font-weight: 800;
            font-family: monospace;
            background: #00000044;
            padding: 0 8px;
            border-radius: 40px;
            letter-spacing: 2px;
            color: #f5f9ff;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
            min-width: 80px;
            display: inline-block;
        }

        .seconds-text {
            font-size: 1rem;
            color: #ccd9ff;
        }

        .info-note {
            font-size: 0.78rem;
            color: #8d9dd6;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 6px 14px;
            margin-top: 1.5rem;
            display: inline-block;
        }

        /* адаптивность */
        @media (max-width: 500px) {
            .glass-panel {
                padding: 2rem 1.2rem;
                border-radius: 2rem;
            }
            .glasso-btn {
                font-size: 1.2rem;
                padding: 0.8rem 1.5rem;
                min-width: 220px;
            }
            .android-btn {
                font-size: 1rem;
                padding: 0.7rem 1.3rem;
                min-width: 200px;
            }
            .timer-number {
                font-size: 1.6rem;
                min-width: 65px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }

        .glasso-btn:focus-visible, .android-btn:focus-visible {
            outline: 2px solid white;
            outline-offset: 3px;
        }

        .hidden-redirect-msg {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #000000aa;
            color: #ccc;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 99;
            font-family: monospace;
        }

        button:disabled {
            opacity: 0.6;
            cursor: default;
            transform: none;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>GLASSOGRAM</h1>
    <div class="sub">социальная сеть нового света</div>

    <!-- Главная кнопка перенаправления -->
    <button class="glasso-btn" id="redirectBtn">
        ПЕРЕЙТИ В GLASSOGRAM
    </button>

    <!-- разделитель -->
    <div class="divider"></div>

    <!-- Кнопка скачивания Android приложения -->
    <button class="android-btn" id="downloadAndroidBtn">
        Скачать приложение для Android
    </button>

    <!-- Отображение обратного таймера -->
    <div class="timer-container">
        <span class="timer-label">Авто-переход через</span>
        <span class="timer-number" id="countdownDisplay">22</span>
        <span class="seconds-text">сек</span>
    </div>
    <div class="info-note">
        Нажмите кнопку или подождите 22 секунды — вы будете перенаправлены
    </div>
</div>

<!-- вспомогательный элемент для статуса -->
<div class="hidden-redirect-msg" id="statusMsg">
    готово к переходу
</div>

<script>
    (function() {
        // Целевой URL для основного перенаправления
        const TARGET_URL = "https://glasso-gram-social-network--gipnorobloxman.replit.app/";
        // URL для скачивания Android приложения
        const ANDROID_DOWNLOAD_URL = "https://workupload.com/file/dPnBPStV4pZ";
        
        // Переменные состояния
        let countdown = 22;
        let timerId = null;
        let isRedirected = false;
        let userClicked = false;
        
        // DOM элементы
        const btn = document.getElementById('redirectBtn');
        const androidBtn = document.getElementById('downloadAndroidBtn');
        const countdownSpan = document.getElementById('countdownDisplay');
        const statusMsgDiv = document.getElementById('statusMsg');
        
        // Функция, которая выполняет перенаправление на основной URL
        function performRedirect() {
            if (isRedirected) return;
            
            isRedirected = true;
            
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            
            if (statusMsgDiv) {
                statusMsgDiv.textContent = "Перенаправление...";
                statusMsgDiv.style.background = "#ff4d6daa";
                statusMsgDiv.style.color = "white";
            }
            
            if (btn) {
                btn.disabled = true;
                btn.style.opacity = "0.7";
                btn.style.cursor = "default";
                btn.textContent = "ПЕРЕХОД...";
            }
            
            if (androidBtn) {
                androidBtn.disabled = true;
                androidBtn.style.opacity = "0.6";
                androidBtn.style.cursor = "default";
            }
            
            window.location.href = TARGET_URL;
        }
        
        // Функция для скачивания Android приложения (открытие ссылки в новой вкладке)
        function performAndroidDownload() {
            if (isRedirected) return;
            
            // Открываем ссылку на скачивание в новой вкладке, чтобы не мешать основному таймеру
            window.open(ANDROID_DOWNLOAD_URL, '_blank');
            
            if (statusMsgDiv) {
                statusMsgDiv.textContent = "Ссылка на скачивание открыта";
                statusMsgDiv.style.background = "#2a5f3eaa";
                setTimeout(() => {
                    if (statusMsgDiv && !isRedirected) {
                        statusMsgDiv.textContent = "готово к переходу";
                        statusMsgDiv.style.background = "#000000aa";
                    }
                }, 2000);
            }
        }
        
        // Обновление отображения таймера
        function updateTimerDisplay() {
            if (countdownSpan) {
                countdownSpan.textContent = countdown;
            }
            
            if (countdown <= 0 && !isRedirected && !userClicked) {
                if (timerId) {
                    clearInterval(timerId);
                    timerId = null;
                }
                performRedirect();
            }
        }
        
        // Запуск обратного отсчета
        function startCountdown() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            
            if (userClicked || isRedirected) return;
            
            timerId = setInterval(function() {
                if (userClicked || isRedirected) {
                    if (timerId) {
                        clearInterval(timerId);
                        timerId = null;
                    }
                    return;
                }
                
                if (countdown > 0) {
                    countdown--;
                    updateTimerDisplay();
                } else {
                    if (timerId) {
                        clearInterval(timerId);
                        timerId = null;
                    }
                    if (!userClicked && !isRedirected) {
                        performRedirect();
                    }
                }
            }, 1000);
        }
        
        // Обработчик клика по основной кнопке
        function onButtonClick() {
            if (isRedirected) return;
            
            userClicked = true;
            
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            
            if (countdownSpan) {
                countdownSpan.textContent = "0";
            }
            
            const timerLabel = document.querySelector('.timer-label');
            if (timerLabel) {
                timerLabel.innerHTML = "Ручной переход";
            }
            
            const secondsSpan = document.querySelector('.seconds-text');
            if (secondsSpan) {
                secondsSpan.textContent = "";
            }
            
            if (statusMsgDiv) {
                statusMsgDiv.textContent = "Нажато! Перенаправляем...";
                statusMsgDiv.style.background = "#1e3c72aa";
            }
            
            setTimeout(() => {
                if (!isRedirected) {
                    performRedirect();
                }
            }, 50);
        }
        
        // Обработчик для кнопки Android (скачивание)
        function onAndroidClick() {
            if (isRedirected) return;
            performAndroidDownload();
        }
        
        // Добавляем слушатели
        if (btn) {
            btn.addEventListener('click', onButtonClick);
        }
        
        if (androidBtn) {
            androidBtn.addEventListener('click', onAndroidClick);
        }
        
        // Инициализация
        updateTimerDisplay();
        startCountdown();
        
        if (btn) {
            btn.setAttribute('aria-label', 'Перейти в GLASSOGRAM');
        }
        
        if (androidBtn) {
            androidBtn.setAttribute('aria-label', 'Скачать приложение для Android');
        }
        
        console.log("Страница готова. Авто-переход через 22 сек. Кнопки активны.");
        
        window.addEventListener('beforeunload', function() {
            if (timerId) {
                clearInterval(timerId);
            }
        });
    })();
</script>
</body>
</html>
