<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GLASSOGRAM | Перенаправление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* небольшая деталь: при долгом удержании не выделяется текст */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #19233c 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* эффект свечения сзади */
        body::before {
            content: "";
            position: absolute;
            width: 180%;
            height: 180%;
            top: -40%;
            left: -40%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 80, 120, 0.2), rgba(0, 30, 60, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* главный контейнер карточки */
        .glass-panel {
            background: rgba(20, 28, 40, 0.65);
            backdrop-filter: blur(18px);
            border-radius: 3.5rem;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .glass-panel:hover {
            transform: scale(1.01);
            box-shadow: 0 30px 55px rgba(0, 0, 0, 0.5);
        }

        /* логотип / иконка */
        .logo-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: inline-block;
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3));
            animation: gentleFloat 3s infinite ease-in-out;
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #c0ccf0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #a9b7e8;
            font-weight: 500;
            font-size: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            display: inline-block;
            padding-bottom: 6px;
        }

        /* кнопка — главный акцент */
        .glasso-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(105deg, #ff4d6d, #ff1e4d);
            border: none;
            padding: 1rem 2.2rem;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: inherit;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 15px 25px -8px rgba(255, 30, 77, 0.4);
            margin: 1.2rem 0 1.8rem;
            letter-spacing: 0.5px;
            backdrop-filter: blur(2px);
            width: auto;
            min-width: 260px;
        }

        .glasso-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(105deg, #ff607d, #ff1f50);
            box-shadow: 0 22px 30px -12px rgba(255, 30, 77, 0.6);
        }

        .glasso-btn:active {
            transform: translateY(2px);
            transition: 0.05s;
        }

        /* таймер-блок */
        .timer-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 100px;
            padding: 0.75rem 1.2rem;
            margin: 1rem 0 0.5rem;
            display: inline-flex;
            align-items: baseline;
            gap: 10px;
            backdrop-filter: blur(4px);
            font-weight: 500;
        }

        .timer-label {
            font-size: 1rem;
            color: #b9c8ff;
        }

        .timer-number {
            font-size: 2rem;
            font-weight: 800;
            font-family: monospace;
            background: #00000044;
            padding: 0 8px;
            border-radius: 40px;
            letter-spacing: 2px;
            color: #f5f9ff;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
            min-width: 80px;
            display: inline-block;
        }

        .seconds-text {
            font-size: 1rem;
            color: #ccd9ff;
        }

        .info-note {
            font-size: 0.8rem;
            color: #8d9dd6;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 6px 14px;
            margin-top: 1.8rem;
            display: inline-block;
        }

        /* адаптивность */
        @media (max-width: 500px) {
            .glass-panel {
                padding: 2rem 1.2rem;
                border-radius: 2rem;
            }
            .glasso-btn {
                font-size: 1.2rem;
                padding: 0.8rem 1.5rem;
                min-width: 220px;
            }
            .timer-number {
                font-size: 1.6rem;
                min-width: 65px;
            }
            h1 {
                font-size: 1.7rem;
            }
        }

        /* предотвращает мерцание при нажатии */
        .glasso-btn:focus-visible {
            outline: 2px solid white;
            outline-offset: 3px;
        }

        /* спиннер/статус (при необходимости незаметно) */
        .hidden-redirect-msg {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #000000aa;
            color: #ccc;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 99;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="logo-icon">
        
    </div>
    <h1>GLASSOGRAM</h1>
    <div class="sub">социальная сеть жоская</div>

    <!-- Главная кнопка перенаправления -->
    <button class="glasso-btn" id="redirectBtn">
         ПЕРЕЙТИ В GLASSOGRAM 
    </button>

    <!-- Отображение обратного таймера -->
    <div class="timer-container">
        <span class="timer-label"> Авто-переход через</span>
        <span class="timer-number" id="countdownDisplay">22</span>
        <span class="seconds-text">сек</span>
    </div>
    <div class="info-note">
         Нажмите кнопку или подождите 22 секунды — вы будете перенаправлены
    </div>
</div>

<!-- необязательный вспомогательный элемент (для отладки/эстетики) -->
<div class="hidden-redirect-msg" id="statusMsg">
    ✓ готово к переходу
</div>

<script>
    (function() {
        // Целевой URL (перенаправление)
        const TARGET_URL = "https://glasso-gram-social-network--gipnorobloxman.replit.app/";
        
        // Переменные состояния
        let countdown = 22;              // начальное значение таймера (секунд)
        let timerId = null;              // идентификатор интервала
        let isRedirected = false;        // флаг, чтобы избежать многократного перенаправления
        let userClicked = false;         // опционально, но влияет на отмену авто-перехода
        
        // DOM элементы
        const btn = document.getElementById('redirectBtn');
        const countdownSpan = document.getElementById('countdownDisplay');
        const statusMsgDiv = document.getElementById('statusMsg');
        
        // Функция, которая выполняет перенаправление (с проверкой флага)
        function performRedirect() {
            if (isRedirected) return;     // уже был переход или идёт
            
            isRedirected = true;
            
            // Остановить таймер, если он ещё активен
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            
            // Небольшая визуальная обратная связь (чтобы пользователь понял)
            if (statusMsgDiv) {
                statusMsgDiv.textContent = "⟳ Перенаправление...";
                statusMsgDiv.style.background = "#ff4d6daa";
                statusMsgDiv.style.color = "white";
            }
            
            // Изменяем кнопку, делаем её неактивной на время (эстетика)
            if (btn) {
                btn.disabled = true;
                btn.style.opacity = "0.7";
                btn.style.cursor = "default";
                btn.textContent = " ПЕРЕХОД... ";
            }
            
            // Выполняем переход на целевой URL
            // Используем window.location.replace, чтобы не создавать историю (или assign)
            // Важно: задержка в 0ms, но для лучшей визуализации можно сделать мгновенно
            window.location.href = TARGET_URL;
        }
        
        // Обновление отображения таймера и уменьшение счетчика
        function updateTimerDisplay() {
            if (countdownSpan) {
                countdownSpan.textContent = countdown;
            }
            
            // Если таймер дошел до нуля и ещё не было перенаправления
            if (countdown <= 0 && !isRedirected && !userClicked) {
                // Останавливаем интервал, чтобы избежать повторных вызовов
                if (timerId) {
                    clearInterval(timerId);
                    timerId = null;
                }
                performRedirect();
            }
        }
        
        // Функция, которая запускает обратный отсчет (если не нажато)
        function startCountdown() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            
            // Если уже пользователь нажал, не запускаем авто-переход (счетчик не нужен)
            if (userClicked || isRedirected) return;
            
            timerId = setInterval(function() {
                // Если уже был клик или перенаправление — останавливаем таймер
                if (userClicked || isRedirected) {
                    if (timerId) {
                        clearInterval(timerId);
                        timerId = null;
                    }
                    return;
                }
                
                // Уменьшаем счетчик, если больше нуля
                if (countdown > 0) {
                    countdown--;
                    updateTimerDisplay();
                } else {
                    // Когда счетчик становится 0, вызываем перенаправление
                    if (timerId) {
                        clearInterval(timerId);
                        timerId = null;
                    }
                    if (!userClicked && !isRedirected) {
                        performRedirect();
                    }
                }
            }, 1000);
        }
        
        // Обработчик клика по кнопке
        function onButtonClick() {
            // Если уже был переход или кнопка заблокирована
            if (isRedirected) return;
            
            // Помечаем, что пользователь совершил действие (отменяем авто-переход)
            userClicked = true;
            
            // Останавливаем любой активный таймер (авто-переход больше не нужен)
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            
            // Меняем внешний вид таймера (чтобы показать отмену авто)
            if (countdownSpan) {
                countdownSpan.textContent = "🚀";
            }
            const timerContainerText = document.querySelector('.timer-label');
            if (timerContainerText) {
                timerContainerText.innerHTML = "✨ Ручной переход ✨";
            }
            const secondsSpan = document.querySelector('.seconds-text');
            if (secondsSpan) {
                secondsSpan.textContent = "";
            }
            
            // Дополнительный эффект: сообщение в статусе
            if (statusMsgDiv) {
                statusMsgDiv.textContent = "🔘 Нажато! Перенаправляем...";
                statusMsgDiv.style.background = "#1e3c72aa";
            }
            
            // И непосредственно перенаправление (с задержкой в 50мс для плавности анимации кнопки)
            // Но чтобы не тормозить, можно сразу вызывать performRedirect, но с microtask или setTimeout
            // Лучше дать браузеру перерисовать состояние кнопки, но перенаправление будет быстрым.
            setTimeout(() => {
                if (!isRedirected) {
                    performRedirect();
                }
            }, 50);
        }
        
        // Добавляем слушатель события на кнопку
        if (btn) {
            btn.addEventListener('click', onButtonClick);
        }
        
        // Инициализация: отображаем начальное значение 22 секунды
        updateTimerDisplay();
        
        // Запускаем обратный отсчет (авто-перенаправление)
        startCountdown();
        
        // Дополнительная защита: если пользователь как-то перезагрузил страницу или перешел в бэкграунд,
        // таймер будет жить нормально. Но также обработаем видимость страницы (опционально)
        // При скрытии вкладки setInterval немного замедляется, но точность не критична — переход всё равно произойдет.
        // Доп. элегантность: если вдруг пользователь нажал на кнопку после окончания таймера (но флаг уже сработал) - не сработает.
        
        // Также на всякий случай отключаем возможность повторного клика после перенаправления (уже есть флаг)
        // Обрабатываем крайний случай: если скрипт загрузился, и пользователь нажал на кнопку несколько раз.
        // При первом клике userClicked = true, остальные клики не вызовут повторный переход из-за флага isRedirected.
        
        // Для улучшения доступности: добавим атрибут role
        if (btn) {
            btn.setAttribute('aria-label', 'Перейти в GLASSOGRAM, социальная сеть');
        }
        
        // Небольшой лог в консоль (не мешает)
        console.log("Страница готова. Авто-переход через 22 сек. Кнопка активна.");
        
        // Доп. фича: если пользователь навел на кнопку и передумал, ничего страшного.
        // Также очищаем таймер при выгрузке страницы (на всякий случай)
        window.addEventListener('beforeunload', function() {
            if (timerId) {
                clearInterval(timerId);
            }
        });
        
        // Экстренный случай: если пользователь быстро нажал кнопку в промежутке между тиками,
        // мы уже останавливаем таймер и инициируем переход.
        // На случай, если таймер уже вызвал performRedirect, но клик произошел почти одновременно,
        // performRedirect проверит isRedirected и не выполнится дважды.
    })();
</script>
</body>
</html>
